name: Enterprise AI Platform CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Phase 1: Continuous Integration 
  test-python-code:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Automated Tests (PyTest)
      env:
        GROQ_API_KEY: "dummy_api_key_for_testing_only"
      run: |
        PYTHONPATH=. pytest tests/

  # Phase 2: Continuous Delivery 
  build-docker-image:
    needs: test-python-code 
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Verify Dockerfile builds successfully
      run: |
        docker build -t logistics-agentic-platform:latest .